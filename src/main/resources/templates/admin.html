<!DOCTYPE html>
<html>
<body>
    <h2>Admin Page</h2>

    <h3>Users</h3>
    <div th:each="user : ${users}">
        <p>
            <span th:text="${user.username}"></span> -
            <span th:text="${user.role}"></span>
        </p>
    </div>

    <hr>

    <h3>Comments</h3>
    <div th:each="comment : ${comments}">
        <p>
            <strong th:text="${comment.username}"></strong>:
            <span th:utext="${comment.content}"></span>
        </p>
    </div>
</body>
</html>
